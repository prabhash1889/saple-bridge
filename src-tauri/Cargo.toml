[package]
name = "saple-bridge"
version = "1.0.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "saple_bridge_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9.0"
uuid = { version = "1", features = ["v4"] }
rfd = "0.15.0"
keyring = "2.1"
# Amber agent: outbound HTTPS to LLM providers. rustls-tls (no native OpenSSL) keeps the
# Windows build self-contained; `stream` enables Response::bytes_stream() for SSE.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
futures-util = "0.3"
# Amber "Claude Code" provider: spawn the `claude` CLI and stream its NDJSON output. Tauri already
# pulls tokio; these features add async process spawn + line reading + select/sleep for cancel.
tokio = { version = "1", features = ["process", "io-util", "time", "macros", "rt"] }

[target.'cfg(windows)'.dependencies]
# PTY process-tree cleanup: each shell is placed in a Job Object so closing a pane kills the
# AI CLI (and its children), not just powershell.exe. See `proc_tree` in src/pty.rs.
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
] }


