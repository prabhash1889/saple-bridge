name: Release

# Cut a release by pushing a version tag (see `npm run release`, which bumps + tags + pushes):
#   git tag v1.1.0 && git push --follow-tags
# This builds the signed, updater-ready Windows and macOS (Apple Silicon) bundles and publishes a
# DRAFT GitHub release with `latest.json`. Both matrix legs upload into the same draft; tauri-action
# merges each platform's entry into `latest.json` rather than overwriting. Installed apps only see
# the update once you review and publish that draft.
on:
  push:
    tags:
      - 'v*'

# The release job needs to create the GitHub release and upload the installer + latest.json.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    # fail-fast: false so a mac failure never cancels the Windows leg. Worst case: the Windows
    # installer + its latest.json entry still publish, the draft just lacks the .dmg.
    # macos-latest is Apple Silicon (arm64); Intel Macs would need a separate x86_64 / universal
    # build. macOS artifacts are updater-signed (minisign) but NOT Apple-notarized yet, so Gatekeeper
    # will warn on first open until an Apple Developer cert is wired in.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Two sibling checkouts: prepare-sidecar.mjs builds ../saple-mcp relative to the bridge root,
      # so the layout on disk must be <workspace>/saple-bridge and <workspace>/saple-mcp.
      - name: Checkout saple-bridge
        uses: actions/checkout@v4
        with:
          path: saple-bridge

      - name: Checkout saple-mcp (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: prabhash1889/saple-mcp
          path: saple-mcp
          # saple-mcp is a separate repo; the default GITHUB_TOKEN can't read it. Provide a PAT
          # (repo scope) or deploy key as the SAPLE_MCP_TOKEN secret. Drop this line if it's public.
          token: ${{ secrets.SAPLE_MCP_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saple-bridge/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: saple-bridge/src-tauri

      - name: Install dependencies
        run: npm ci
        working-directory: saple-bridge

      # tauri-action runs `tauri build` (which runs beforeBuildCommand: stage the real sidecar +
      # build the frontend), signs the updater artifacts, uploads the installer, and generates
      # latest.json. The release overlay adds createUpdaterArtifacts + the updater feed so the base
      # config (and local `npm run tauri:build`) stays signing-free.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: saple-bridge
          tagName: ${{ github.ref_name }}
          releaseName: 'Saple Bridge ${{ github.ref_name }}'
          releaseDraft: true
          args: --config src-tauri/tauri.release.conf.json
