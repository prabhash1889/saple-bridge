name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, lint, test, build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust (${{ matrix.os }})
    # macOS 11+ is a shipped target, so build/test the native layer there too — it exercises the
    # non-Windows PTY cleanup path, the login-shell/$SHELL handling, and other cfg-gated code that
    # the Windows runner never compiles.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri's build.rs checks that the externalBin sidecar file exists, even for a
      # bare `cargo check`/`test` (it's never run or bundled here). The real sidecar is
      # built from the sibling ../saple-mcp repo, which CI doesn't check out, so stage an
      # empty placeholder with the target-triple name to satisfy the existence check.
      # ponytail: placeholder is enough for check/test; real sidecar staging lives in the tauri:build path.
      - name: Stage placeholder sidecar
        shell: bash
        run: |
          triple=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/binaries
          if [[ "$triple" == *windows* ]]; then
            touch "src-tauri/binaries/saple-mcp-$triple.exe"
          else
            touch "src-tauri/binaries/saple-mcp-$triple"
          fi

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  e2e:
    name: E2E smoke (windows)
    runs-on: windows-latest
    # WebView2/msedgedriver setup is inherently flaky — keep this non-blocking until it has
    # proven stable, so a driver hiccup never red-Xes an otherwise good PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # dist/ must exist before cargo build — Tauri embeds the frontend at compile time.
      - name: Build frontend
        run: npm run build

      # Same placeholder trick as the rust job: build.rs only checks the sidecar file exists; the
      # smoke test spawns a plain shell, not the MCP sidecar, so an empty stub is enough.
      - name: Stage placeholder sidecar
        shell: bash
        run: |
          triple=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/saple-mcp-$triple.exe"

      - name: Build app binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install E2E deps
        working-directory: e2e
        run: npm install

      - name: Run smoke test
        working-directory: e2e
        run: npm test
