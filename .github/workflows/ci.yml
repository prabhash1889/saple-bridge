name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, lint, test, build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust (cargo check, test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri's build.rs checks that the externalBin sidecar file exists, even for a
      # bare `cargo check`/`test` (it's never run or bundled here). The real sidecar is
      # built from the sibling ../saple-mcp repo, which CI doesn't check out, so stage an
      # empty placeholder with the target-triple name to satisfy the existence check.
      # ponytail: placeholder is enough for check/test; real sidecar staging lives in the tauri:build path.
      - name: Stage placeholder sidecar
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String '^host:\s*(.+)$').Matches.Groups[1].Value.Trim()
          $name = if ($triple -like '*windows*') { "saple-mcp-$triple.exe" } else { "saple-mcp-$triple" }
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path "src-tauri/binaries/$name" | Out-Null

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
